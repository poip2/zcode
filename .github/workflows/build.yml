---
name: Build

on:  # yamllint disable-line rule:truthy
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            name: macOS
            bundles: dmg
            artifactPath: src-tauri/target/release/bundle/dmg/*.dmg
          - platform: windows-latest
            name: Windows
            bundles: msi
            artifactPath: src-tauri/target/release/bundle/msi/*.msi

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: zcode ${{ github.ref_name }}
          releaseBody: |
            Full changelog:
            https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}

            ## Install
            - **macOS**: Download the `.dmg` file
            - **Windows**: Download the `.msi` installer
          releaseDraft: false
          prerelease: false
          args: --bundles ${{ matrix.bundles }}

      - name: Build artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: tauri-apps/tauri-action@v0
        with:
          args: --bundles ${{ matrix.bundles }}

      - name: Upload artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: zcode-${{ matrix.name }}
          path: ${{ matrix.artifactPath }}
          if-no-files-found: error
